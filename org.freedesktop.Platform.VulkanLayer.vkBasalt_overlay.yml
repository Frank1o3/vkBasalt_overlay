id: org.freedesktop.Platform.VulkanLayer.vkBasalt_overlay
branch: "25.08"
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
build-extension: true
separate-locales: false

build-options:
  prefix: /usr/lib/extensions/vulkan/vkBasalt_overlay
  prepend-pkg-config-path: /usr/lib/extensions/vulkan/vkBasalt_overlay/lib/pkgconfig
  prepend-path: /usr/lib/extensions/vulkan/vkBasalt_overlay/bin
  env:
    PKG_CONFIG_PATH: /usr/lib/extensions/vulkan/vkBasalt_overlay/lib/pkgconfig

modules:
  - name: SPIRV-Headers
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    cleanup:
      - "*"
    sources:
      - type: git
        url: https://github.com/KhronosGroup/SPIRV-Headers.git
        tag: vulkan-sdk-1.3.290.0

  - name: vkBasalt_overlay
    buildsystem: meson
    config-opts:
      - --libdir=lib
      - --bindir=bin
      - --datadir=share
      - -Dwith_so=true
      - -Dwith_json=true
      - -Dappend_libdir_vkbasalt=false
    build-options:
      cppflags: -I/usr/lib/extensions/vulkan/vkBasalt_overlay/include
      cxxflags: -I/usr/lib/extensions/vulkan/vkBasalt_overlay/include
    post-install:
      - |
        LAYER_JSON=/usr/lib/extensions/vulkan/vkBasalt_overlay/share/vulkan/implicit_layer.d/vkBasalt-overlay.json
        sed -i 's|"library_path": *"[^"]*"|"library_path": "/usr/lib/extensions/vulkan/vkBasalt_overlay/lib/libvkbasalt-overlay.so"|' "$LAYER_JSON"
    sources:
      - type: git
        url: https://github.com/Frank1o3/vkBasalt_overlay.git
        branch: master
