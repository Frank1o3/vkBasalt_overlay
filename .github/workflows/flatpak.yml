name: Flatpak CI

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        container:
            image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-25.08
            options: --privileged

        steps:
            - uses: actions/checkout@v4

            - name: Build Flatpak extension
              uses: flatpak/flatpak-github-actions/flatpak-builder@v6.6
              with:
                  bundle: vkBasalt_overlay.flatpak
                  manifest-path: org.freedesktop.Platform.VulkanLayer.vkBasalt_overlay.yml
                  cache-key: flatpak-builder-${{ github.sha }}
                  upload-artifact: true
